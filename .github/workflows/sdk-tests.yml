name: Test SDKs
permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test-csharp-sdk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test csharp-sdk
        run: |
          export AIDBOX_LICENSE_ID="${{ secrets.AIDBOX_LICENSE_ID }}"
          make test-csharp-sdk

      - name: Repository contains actual csharp-sdk version
        run: |
          diff_result=$(git diff --exit-code --name-only examples/csharp/generated || true)

          if [ -z "$diff_result" ]; then
            echo "✅ Generated SDK is identical to the one stored in repository."
          else
            echo "❌ Generated SDK differs from the one stored in repository."
            echo "Differences:"
            git diff examples/csharp/generated
            exit 1
          fi

  test-typescript-r4-us-core-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: make test-typescript-r4-us-core-example

      - name: Repository contains actual typescript-sdk version
        run: |
          diff_result=$(git diff --exit-code --name-only examples/typescript-r4-us-core || true)

          if [ -z "$diff_result" ]; then
            echo "✅ Generated SDK is identical to the one stored in repository."
          else
            echo "❌ Generated SDK differs from the one stored in repository."
            echo "Differences:"
            git diff examples/typescript-r4-us-core
            exit 1
          fi

  test-python-sdk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test Python SDK
        run: |
          export AIDBOX_LICENSE_ID="${{ secrets.AIDBOX_LICENSE_ID }}"
          make test-python-sdk

  test-python-fhirpy-sdk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test Python fhirpy SDK
        run: |
          export AIDBOX_LICENSE_ID="${{ secrets.AIDBOX_LICENSE_ID }}"
          make test-python-fhirpy-sdk

      - name: Repository contains actual python-fhirpy-sdk version
        run: |
          diff_result=$(git diff --exit-code --name-only examples/python-fhirpy/fhir_types || true)

          if [ -z "$diff_result" ]; then
            echo "✅ Generated SDK is identical to the one stored in repository."
          else
            echo "❌ Generated SDK differs from the one stored in repository."
            echo "Differences:"
            git diff examples/python-fhirpy/fhir_types
            exit 1
          fi

  test-python-r4-us-core-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: make test-python-r4-us-core-example

      - name: Repository contains actual python-sdk version
        run: |
          diff_result=$(git diff --exit-code --name-only examples/python-r4-us-core/fhir_types || true)

          if [ -z "$diff_result" ]; then
            echo "✅ Generated SDK is identical to the one stored in repository."
          else
            echo "❌ Generated SDK differs from the one stored in repository."
            echo "Differences:"
            git diff examples/python-r4-us-core/fhir_types
            exit 1
          fi

  test-typescript-custom-packages-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: make test-typescript-custom-packages-example

  test-on-the-fly-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: make test-on-the-fly-example

  test-mustache-java-r4-example:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21, 25]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: make test-mustache-java-r4-example
